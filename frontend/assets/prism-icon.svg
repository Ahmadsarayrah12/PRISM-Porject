<svg xmlns="http://www.w3.org/2000/svg" viewBox="100 50 300 280">
    <defs>
        <linearGradient id="frontLeft" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.85"/>
            <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.85"/>
        </linearGradient>
        <linearGradient id="frontRight" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.85"/>
            <stop offset="100%" stop-color="#EC4899" stop-opacity="0.85"/>
        </linearGradient>
        <linearGradient id="backLeft" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4C1D95" />
            <stop offset="100%" stop-color="#1E3A8A" />
        </linearGradient>
        <linearGradient id="backRight" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#9A3412" />
            <stop offset="100%" stop-color="#9D174D" />
        </linearGradient>
        <linearGradient id="bottomLeft" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#1E3A8A" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.1"/>
        </linearGradient>
        <linearGradient id="bottomRight" x1="100%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#9A3412" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#EC4899" stop-opacity="0.1"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="7" />
        </filter>
    </defs>
    <ellipse cx="250" cy="305" rx="100" ry="12" fill="#000000" opacity="0.12" filter="url(#shadow)" />
    <g stroke="#ffffff" stroke-width="1" stroke-linejoin="round">
        <polygon points="250,80 140,210 250,160" fill="url(#backLeft)" />
        <polygon points="250,80 360,210 250,160" fill="url(#backRight)" />
        <polygon points="140,210 250,160 250,280" fill="url(#bottomLeft)" />
        <polygon points="360,210 250,160 250,280" fill="url(#bottomRight)" />
    </g>
    <g stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round">
        <polygon points="250,80 140,210 250,280" fill="url(#frontLeft)" />
        <polygon points="250,80 360,210 250,280" fill="url(#frontRight)" />
    </g>
    <polygon points="250,80 140,210 250,280" fill="#ffffff" opacity="0.05" />
