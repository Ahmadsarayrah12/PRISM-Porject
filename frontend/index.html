<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الإعلامي الذكي</title>
    <!-- Tailwind CSS عبر CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- مكتبة Marked.js لتحويل Markdown إلى HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* تنسيقات مخصصة لتجميل محتوى Markdown المُولد */
        .prose h1, .prose h2, .prose h3 { font-weight: bold; margin-top: 1rem; margin-bottom: 0.5rem; color: #1e3a8a; }
        .prose ul, .prose ol { list-style-type: disc; padding-right: 1.5rem; margin-bottom: 1rem; }
        .prose p { margin-bottom: 0.75rem; }
        .prose strong { color: #1d4ed8; }
        .prose blockquote { border-right: 4px solid #3b82f6; padding-right: 1rem; color: #4b5563; background-color: #eff6ff; padding: 0.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col md:flex-row">

    <!-- القائمة الجانبية (Sidebar) -->
    <aside class="w-full md:w-64 bg-slate-900 text-white flex flex-col p-4 shadow-xl shrink-0">
        <h1 class="text-2xl font-extrabold mb-8 text-center mt-4 tracking-wide text-blue-400">المساعد الإعلامي</h1>
        <nav class="flex flex-col gap-3">
            <button class="tool-btn bg-blue-600 hover:bg-blue-500 px-4 py-3 rounded-lg text-right font-semibold transition-all duration-200 border-r-4 border-blue-300 shadow" data-endpoint="summarize" data-title="التلخيص">📝 التلخيص</button>
            <button class="tool-btn hover:bg-slate-800 px-4 py-3 rounded-lg text-right font-semibold transition-all duration-200 border-r-4 border-transparent hover:border-slate-400" data-endpoint="bias" data-title="الموضوعية">⚖️ الموضوعية</button>
            <button class="tool-btn hover:bg-slate-800 px-4 py-3 rounded-lg text-right font-semibold transition-all duration-200 border-r-4 border-transparent hover:border-slate-400" data-endpoint="recycle" data-title="إعادة التدوير">♻️ إعادة التدوير</button>
            <button class="tool-btn hover:bg-slate-800 px-4 py-3 rounded-lg text-right font-semibold transition-all duration-200 border-r-4 border-transparent hover:border-slate-400" data-endpoint="truth-guard" data-title="درع الحقيقة">🛡️ درع الحقيقة</button>
        </nav>
    </aside>

    <!-- مساحة العمل الرئيسية -->
    <main class="flex-1 p-6 flex flex-col w-full max-w-5xl mx-auto">
        <header class="mb-6">
            <h2 id="current-tool-title" class="text-3xl font-bold text-slate-800">أداة التلخيص</h2>
            <p class="text-slate-500 mt-2 text-lg">أدخل الخبر الصحفي أدناه للحصول على التحليل المدعوم بالذكاء الاصطناعي.</p>
        </header>

        <!-- منطقة إدخال النص الصحفي -->
        <div class="bg-white p-5 rounded-xl shadow-md border border-slate-200 mb-6 flex-1 flex flex-col min-h-[350px]">
            <textarea id="news-input" class="w-full flex-1 p-4 text-lg border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none bg-slate-50" placeholder="اكتب أو انسخ النص الصحفي هنا..."></textarea>
            
            <div class="mt-5 flex justify-end">
                <button id="process-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg inline-flex items-center transition-colors shadow-lg">
                    <span id="btn-text">معالجة النص</span>
                    <!-- مؤشر التحميل (Spinner) مخفي افتراضياً -->
                    <svg id="loading-spinner" class="animate-spin mr-3 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- منطقة عرض النتائج (مخفية افتراضياً) -->
        <div id="results-container" class="hidden bg-white p-6 rounded-xl shadow-md border border-slate-200 relative mb-8">
            <div class="flex justify-between items-center mb-5 border-b border-slate-100 pb-3">
                <h3 class="text-2xl font-bold text-slate-800">النتيجة:</h3>
                <button id="copy-btn" class="text-blue-600 hover:text-blue-800 hover:bg-blue-50 px-3 py-1.5 rounded font-medium text-sm flex items-center gap-2 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    نسخ النتيجة
                </button>
            </div>
            <div id="results-content" class="prose max-w-none text-slate-700 leading-loose text-lg">
                <!-- سيتم عرض محتوى Markdown المنسق هنا بواسطة JavaScript -->
            </div>
        </div>
    </main>

    <!-- ربط ملف JavaScript -->
    <script src="script.js"></script>
</body>
</html>
