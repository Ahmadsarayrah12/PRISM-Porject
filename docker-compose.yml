version: '3.8'

services:
  # خدمة التطبيق الأساسية (Node.js) — تتصل بـ MongoDB Atlas عبر MONGO_URI من ملف .env
  prism-app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=8080
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
